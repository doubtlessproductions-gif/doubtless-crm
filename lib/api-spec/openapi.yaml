components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
      required: [name, email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        userType:
          type: string
        allowedTabs:
          type: array
          items:
            type: string
          nullable: true
        colorMode:
          type: string
          enum: [light, dark]
          nullable: true
        createdAt:
          type: string
          format: date-time
        permissions:
          type: object
          additionalProperties:
            type: boolean
          nullable: true
      required: [id, name, email, role, createdAt]

    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
        activeToday:
          type: integer
        totalLogins:
          type: integer
        memberSince:
          type: string
          format: date-time
        totalContacts:
          type: integer
        openDeals:
          type: integer
        pipelineValue:
          type: number
        wonDeals:
          type: integer
        mrr:
          type: number
        winRate:
          type: number
          nullable: true
        pipelineByStage:
          type: array
          items:
            type: object
            properties:
              stage:
                type: string
              value:
                type: number
              count:
                type: integer
            required: [stage, value, count]
        revenueTrend:
          type: array
          items:
            type: object
            properties:
              month:
                type: string
              revenue:
                type: number
            required: [month, revenue]
        topContacts:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              company:
                type: string
                nullable: true
              totalValue:
                type: number
              dealCount:
                type: integer
            required: [id, name, totalValue, dealCount]
        upcomingEvents:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              title:
                type: string
              startTime:
                type: string
                format: date-time
              endTime:
                type: string
                format: date-time
              meetLink:
                type: string
                nullable: true
            required: [id, title, startTime, endTime]
      required: [totalUsers, activeToday, totalLogins, memberSince, totalContacts, openDeals, pipelineValue, wonDeals, mrr, pipelineByStage, revenueTrend, topContacts, upcomingEvents]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        action:
