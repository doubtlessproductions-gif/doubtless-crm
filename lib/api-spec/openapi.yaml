openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: dashboard
  - name: contacts
  - name: deals
  - name: admin
  - name: theme
  - name: messages
  - name: files
  - name: analytics
  - name: templates
  - name: payments
  - name: calendar
  - name: artists
  - name: search
  - name: video
  - name: projects
  - name: release-assets
  - name: royalties
  - name: content
  - name: artist-profiles
  - name: invoice-email-templates
  - name: discovery
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/invite:
    post:
      operationId: createInvite
      tags: [auth]
      summary: Create a staff invite (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteBody"
      responses:
        "201":
          description: Invite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/invite/{token}:
    get:
      operationId: validateInvite
      tags: [auth]
      summary: Validate a staff invite token
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteInfo"
        "404":
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Invite expired or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/invite/{token}/accept:
    post:
      operationId: acceptInvite
      tags: [auth]
      summary: Accept a staff invite and create account
      parameters:
        - in: path
          name: token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptInviteBody"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "404":
          description: Invite not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "410":
          description: Invite expired or already used
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── CONTACTS ──────────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contacts
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: search
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Contact list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a contact
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactBody"
      responses:
        "201":
          description: Contact created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{id}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a contact
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateContact
      tags: [contacts]
      summary: Update a contact
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactBody"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"
    delete:
      operationId: deleteContact
      tags: [contacts]
      summary: Delete a contact
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── DEALS ──────────────────────────────────────────────────────────────
  /deals:
    get:
      operationId: listDeals
      tags: [deals]
      summary: List all deals
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: stage
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Deal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deal"
    post:
      operationId: createDeal
      tags: [deals]
      summary: Create a deal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealBody"
      responses:
        "201":
          description: Deal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}:
    get:
      operationId: getDeal
      tags: [deals]
      summary: Get a deal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealDetail"
    put:
      operationId: updateDeal
      tags: [deals]
      summary: Update a deal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealBody"
      responses:
        "200":
          description: Updated deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"
    delete:
      operationId: deleteDeal
      tags: [deals]
      summary: Delete a deal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /deals/{id}/stage:
    patch:
      operationId: updateDealStage
      tags: [deals]
      summary: Update deal stage
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStageBody"
      responses:
        "200":
          description: Updated deal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deal"

  /deals/{id}/notes:
    post:
      operationId: addDealNote
      tags: [deals]
      summary: Add a note to a deal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DealNoteBody"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DealNote"

  # ── ADMIN ──────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: List all users (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/role:
    patch:
      operationId: adminUpdateUserRole
      tags: [admin]
      summary: Update user role (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"

  /admin/users/{id}/rate:
    put:
      operationId: adminSetUserRate
      tags: [admin]
      summary: Set per-user target hourly rate (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserRateBody"
      responses:
        "200":
          description: Updated user rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRateResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/role-quotas:
    get:
      operationId: adminGetRoleQuotas
      tags: [admin]
      summary: Get all role quotas (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Role quota list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleQuota"
    put:
      operationId: adminSetRoleQuotas
      tags: [admin]
      summary: Upsert role quotas (admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetRoleQuotasBody"
      responses:
        "200":
          description: Updated role quotas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleQuota"

  /admin/users/{id}/tabs:
    get:
      operationId: adminGetUserTabs
      tags: [admin]
      summary: Get user tab permissions (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User tab permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTabsResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: adminUpdateUserTabs
      tags: [admin]
      summary: Update user tab permissions (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTabsBody"
      responses:
        "200":
          description: Updated tab permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTabsResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── PORTAL CLIENTS (admin + owner) ────────────────────────────────────
  /admin/portal-clients:
    get:
      operationId: adminListPortalClients
      tags: [admin]
      summary: List all portal clients with deal counts (admin + owner)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portal client list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPortalClient"

  /admin/portal-clients/{id}:
    get:
      operationId: adminGetPortalClientDetail
      tags: [admin]
      summary: Get portal client detail with linked deals and recent activity (admin + owner)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Portal client detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminPortalClientDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/portal-invite:
    post:
      operationId: adminInvitePortalClient
      tags: [admin]
      summary: Invite a contact to the portal (admin + owner)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contactId]
              properties:
                contactId:
                  type: integer
      responses:
        "200":
          description: Invite URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  inviteUrl:
                    type: string
        "400":
          description: Invalid input or contact has no email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/portal-reinvite/{id}:
    post:
      operationId: adminReinvitePortalClient
      tags: [admin]
      summary: Refresh invite token without resetting credentials (admin + owner)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: New invite URL (existing credentials remain valid)
          content:
            application/json:
              schema:
                type: object
                properties:
                  inviteUrl:
                    type: string
        "404":
          description: Portal user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/portal-reset/{id}:
    post:
      operationId: adminResetPortalClient
      tags: [admin]
      summary: Reset portal credentials — wipes password and forces re-acceptance (admin + owner)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset complete; new invite URL returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  inviteUrl:
                    type: string
        "404":
          description: Portal user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/portal-contacts:
    get:
      operationId: adminListPortalContacts
      tags: [admin]
      summary: List contacts with email not yet invited to portal (admin + owner)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available contacts for portal invite
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContactSummary"

  /admin/portal-users/{id}/status:
    patch:
      operationId: adminUpdatePortalUserStatus
      tags: [admin]
      summary: Activate or deactivate a portal user (admin + owner)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isActive]
              properties:
                isActive:
                  type: boolean
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  isActive:
                    type: boolean
        "404":
          description: Portal user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/portal-users/{id}:
    delete:
      operationId: adminDeletePortalUser
      tags: [admin]
      summary: Remove a portal user entirely (admin + owner)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "404":
          description: Portal user not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── INTEGRATIONS ──────────────────────────────────────────────────────
  /integrations/connections:
    get:
      operationId: getMyConnections
      tags: [integrations]
      summary: Get current user's integration connections
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of connections (credentials omitted)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserConnection"

  /integrations/connect/{provider}:
    post:
      operationId: connectProvider
      tags: [integrations]
      summary: Connect a provider (Outlook/OneDrive verify connector; Dropbox takes accessToken)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectProviderBody"
      responses:
        "200":
          description: Connection established
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserConnection"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Provider connector not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /integrations/connections/{provider}:
    delete:
      operationId: disconnectProvider
      tags: [integrations]
      summary: Disconnect a provider
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]

  # ── THEME ──────────────────────────────────────────────────────────────
  /theme:
    get:
      operationId: getTheme
      tags: [theme]
      summary: Get workspace theme
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Theme settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"
    put:
      operationId: updateTheme
      tags: [theme]
      summary: Update workspace theme (admin/manager only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ThemeBody"
      responses:
        "200":
          description: Updated theme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Theme"

  # ── MESSAGES ──────────────────────────────────────────────────────────
  /messages/threads:
    get:
      operationId: listThreads
      tags: [messages]
      summary: List all message threads
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Thread list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageThread"
    post:
      operationId: createThread
      tags: [messages]
      summary: Create a message thread
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThreadBody"
      responses:
        "201":
          description: Thread created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageThread"

  /messages/threads/{id}:
    get:
      operationId: getThread
      tags: [messages]
      summary: Get thread with messages
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Thread detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThreadDetail"

  /messages/threads/{id}/messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a thread
      security:
        - bearerAuth: []
      parameters:
